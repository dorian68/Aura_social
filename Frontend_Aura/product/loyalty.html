<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AURA · Loyalty builder</title>
<link rel="icon" href="../assets/aura-logo.png">
<link rel="stylesheet" href="../css/aura.css">
<style>
.main{padding:0;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 30px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(8,11,10,.78);backdrop-filter:blur(14px);z-index:20}
.sim-banner{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--gold-soft)} .sim-banner svg{width:15px;height:15px}
.content{padding:clamp(22px,2.6vw,38px);max-width:1280px}
.l-head{margin-bottom:26px;max-width:640px}
.l-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:22px;align-items:start}
.tier-edit{border:1px solid var(--line);border-radius:var(--r-lg);padding:22px;margin-bottom:16px;background:linear-gradient(180deg,var(--glass-2),transparent);transition:border-color .25s}
.tier-edit.sel{border-color:rgba(184,255,77,.4);box-shadow:var(--glow-lime-soft)}
.tier-edit-head{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.tier-name-in{font-family:var(--display);font-size:20px;font-weight:600;color:var(--cream);background:transparent;border:none;border-bottom:1px dashed var(--line-strong);padding:2px 0;max-width:200px}
.tier-name-in:focus{outline:none;border-color:var(--lime)}
.tier-swatch{width:14px;height:14px;border-radius:5px;flex:none}
.price-row{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:18px}
.price-field{flex:1;min-width:140px}
.price-input{display:flex;align-items:center;gap:4px;background:var(--ink-700);border:1px solid var(--line-strong);border-radius:var(--r-md);padding:0 14px;height:46px}
.price-input span{color:var(--t-lo);font-size:16px}
.price-input input{background:none;border:none;color:var(--cream);font-size:18px;font-family:var(--display);width:100%}
.price-input input:focus{outline:none}
.perk-list{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
.perk{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:var(--r-md);background:var(--glass);border:1px solid var(--line);font-size:14px;color:var(--t-mid)}
.perk .ck{width:18px;height:18px;border-radius:6px;background:var(--lime);display:grid;place-items:center;flex:none}
.perk .ck svg{width:12px;height:12px;color:#0A1206}
.perk .rm{margin-left:auto;color:var(--t-faint);cursor:pointer;font-size:18px;line-height:1;transition:color .2s}
.perk .rm:hover{color:var(--neg)}
.perk-add{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.perk-add button{padding:6px 11px;border-radius:var(--r-pill);background:var(--glass-2);border:1px dashed var(--line-strong);font-size:12.5px;color:var(--t-lo);transition:all .2s}
.perk-add button:hover{border-color:var(--lime);color:var(--lime)}
.cond-row{display:flex;gap:8px;flex-wrap:wrap}
.cond-chip{padding:7px 13px;border-radius:var(--r-pill);background:var(--glass);border:1px solid var(--line);font-size:13px;color:var(--t-mid);cursor:pointer;transition:all .2s}
.cond-chip.on{background:rgba(184,255,77,.1);border-color:rgba(184,255,77,.4);color:var(--lime)}
.preview-stack{position:sticky;top:90px;display:flex;flex-direction:column;gap:16px}
.fan-pass{border-radius:var(--r-xl);padding:24px;position:relative;overflow:hidden;border:1px solid var(--line-strong);background:linear-gradient(150deg,var(--ink-600),var(--ink-700))}
.fan-pass::before{content:"";position:absolute;inset:0;background:radial-gradient(120% 80% at 100% 0%,var(--tier-glow,rgba(184,255,77,.18)),transparent 60%);opacity:.9}
.fan-pass .pp-top{display:flex;align-items:center;justify-content:space-between;position:relative}
.fan-pass .pp-tier{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--tier-c,var(--lime))}
.fan-pass .pp-price{font-family:var(--display);font-size:38px;font-weight:600;color:var(--cream);letter-spacing:-.03em;margin:14px 0 2px;position:relative}
.fan-pass .pp-price small{font-size:.4em;color:var(--t-lo)}
.fan-pass .pp-perks{list-style:none;display:flex;flex-direction:column;gap:9px;margin:18px 0;position:relative}
.fan-pass .pp-perks li{display:flex;gap:9px;font-size:13.5px;color:var(--beige);align-items:center}
.fan-pass .pp-perks svg{width:15px;height:15px;color:var(--tier-c,var(--lime));flex:none}
.fan-pass .chip-row{display:flex;gap:7px;position:relative;margin-bottom:4px}
.proj-card{text-align:center;padding:26px}
.proj-card .v{font-family:var(--display);font-size:46px;font-weight:600;color:var(--lime);letter-spacing:-.03em;line-height:1}
.mini-tabs{display:flex;gap:6px;margin-bottom:14px}
.mini-tabs button{flex:1;padding:9px;border-radius:var(--r-md);background:var(--glass);border:1px solid var(--line);font-size:13px;font-weight:600;color:var(--t-mid);transition:all .2s}
.mini-tabs button.active{background:var(--glass-2);color:var(--cream);box-shadow:inset 0 0 0 1px var(--line-strong)}
@media (max-width:980px){.app-shell{grid-template-columns:1fr}.sidebar{display:none}.l-grid{grid-template-columns:1fr}.preview-stack{position:static}}
</style>
</head>
<body>
<div class="aura-bg"></div>
<div class="app-shell" id="shell">
  <main class="main">
    <div class="topbar">
      <h1 style="font-size:19px" data-t="l_title"></h1>
      <div class="sim-banner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        <span data-t="sim_banner"></span>
      </div>
    </div>
    <div class="content">
      <div class="l-head">
        <div class="eyebrow gold"><span data-t="l_title"></span></div>
        <h2 class="display-md" style="font-size:30px;margin-top:14px" data-t="l_head"></h2>
        <p class="lede" data-t="l_sub"></p>
      </div>
      <div class="l-grid">
        <div>
          <div class="row between" style="margin-bottom:14px">
            <div class="eyebrow no-rule"><span data-t="l_tiers"></span></div>
            <button class="btn btn-ghost btn-sm" id="addTier">+ <span data-t="l_add_tier"></span></button>
          </div>
          <div id="tiersEdit"></div>
        </div>
        <div class="preview-stack">
          <div>
            <div class="row between" style="margin-bottom:12px">
              <div class="eyebrow no-rule"><span data-t="l_preview"></span></div>
              <span class="pill" data-t="l_preview_sub"></span>
            </div>
            <div class="mini-tabs" id="previewTabs"></div>
            <div id="fanPreview"></div>
          </div>
          <div class="card proj-card glow">
            <div class="eyebrow no-rule" style="justify-content:center;margin-bottom:8px"><span data-t="l_projected"></span></div>
            <div class="v tnum" id="projRevenue">$0</div>
            <div class="faint" style="font-size:12px;margin-top:8px"><span class="pill gold" data-t="l_sim"></span></div>
          </div>
          <button class="btn btn-primary btn-block btn-lg" id="saveBtn"><span data-t="l_save"></span></button>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../js/aura-api.js"></script><script src="../js/i18n.js"></script>
<script src="../js/product-shell.js"></script>
<script src="../js/loyalty-copy.js"></script>
<script src="../js/loyalty.js"></script>
</body>
</html>
