<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AURA · Token Economy</title>
<link rel="icon" href="../assets/aura-logo.png">
<link rel="stylesheet" href="../css/aura.css">
<style>
.main{padding:0;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 30px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(8,11,10,.78);backdrop-filter:blur(14px);z-index:20}
.sim-banner{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--gold-soft)} .sim-banner svg{width:15px;height:15px}
.content{padding:clamp(22px,2.6vw,38px);max-width:1280px}
.te-head{margin-bottom:28px;max-width:640px}

.te-grid{display:grid;grid-template-columns:1fr 1.1fr;gap:22px;align-items:start}
.te-right{display:flex;flex-direction:column;gap:16px}

/* score ring (same as analyzer) */
.score-panel{padding:30px;text-align:center}
.big-ring{position:relative;width:200px;height:200px;margin:0 auto 18px;display:grid;place-items:center}
.big-ring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.big-ring .v{font-family:var(--display);font-size:62px;font-weight:600;color:var(--cream);letter-spacing:-.03em;line-height:1}
.big-ring .v small{font-size:.32em;color:var(--t-lo)}

/* sim controls */
.sim-panel{background:linear-gradient(180deg,var(--glass-2),rgba(255,247,232,.01));border:1px solid var(--line);border-radius:var(--r-lg);padding:22px}
.panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px}
.panel-head h3{font-size:16px;font-family:var(--display);font-weight:600;color:var(--cream)}
.panel-head .sub{font-size:12.5px;color:var(--t-lo);margin-top:3px}

.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.num-input{display:flex;align-items:center;gap:0;background:var(--ink-700);border:1px solid var(--line-strong);border-radius:var(--r-md);overflow:hidden;height:46px}
.num-input span{padding:0 12px;font-size:14px;color:var(--t-lo);background:var(--ink-800);border-right:1px solid var(--line);flex:none;display:flex;align-items:center;height:100%;font-family:var(--mono);font-size:12px;letter-spacing:.06em}
.num-input input{flex:1;background:none;border:none;height:100%;padding:0 12px;color:var(--cream);font-size:16px;font-family:var(--display);outline:none}

/* pool donut */
.pool-section{display:flex;align-items:center;gap:20px}
.donut{position:relative;flex:none}

/* mode chips */
.mode-chips{display:flex;gap:7px;flex-wrap:wrap}
.mc{padding:8px 14px;border-radius:var(--r-pill);border:1px solid var(--line);background:var(--glass);cursor:pointer;font-size:13px;font-weight:600;color:var(--t-mid);transition:all .18s}
.mc:hover{border-color:var(--line-strong);color:var(--cream)}
.mc.on{border-color:rgba(184,255,77,.45);background:rgba(184,255,77,.08);color:var(--lime)}

@media (max-width:980px){.app-shell{grid-template-columns:1fr}.sidebar{display:none}.te-grid{grid-template-columns:1fr}}
@media (max-width:560px){.field-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="aura-bg"></div>
<div class="app-shell" id="shell">
  <main class="main">
    <div class="topbar">
      <h1 style="font-size:19px" data-t="te_title"></h1>
      <div class="sim-banner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        <span data-t="sim_banner"></span>
      </div>
    </div>
    <div class="content">

      <div class="te-head">
        <div class="eyebrow gold"><span data-t="te_title"></span></div>
        <h2 class="display-md" style="font-size:30px;margin-top:14px" data-t="te_head"></h2>
        <p class="lede" data-t="te_sub"></p>
      </div>

      <div class="te-grid">
        <!-- LEFT: readiness + pools -->
        <div style="display:flex;flex-direction:column;gap:16px">

          <!-- readiness ring -->
          <div class="card score-panel glow">
            <div class="eyebrow no-rule" style="justify-content:center;margin-bottom:20px"><span data-t="te_readiness"></span></div>
            <div id="teRing">
              <!-- JS renders ring -->
              <div class="big-ring">
                <svg width="200" height="200" viewBox="0 0 200 200">
                  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(232,220,200,.1)" stroke-width="10"/>
                  <circle cx="100" cy="100" r="80" fill="none" stroke="var(--lime)" stroke-width="10" stroke-linecap="round" stroke-dasharray="502" stroke-dashoffset="502" style="transition:stroke-dashoffset 1.3s var(--ease)"/>
                </svg>
                <div class="v"><span class="tnum">—</span><small>/100</small></div>
              </div>
            </div>
            <p id="ringLabel" style="font-size:14px;color:var(--lime);font-weight:600;margin-bottom:6px;text-align:center">Loading…</p>
            <p class="muted" style="font-size:13px;max-width:26em;margin:0 auto;text-align:center" data-t="te_readiness_sub"></p>
          </div>

          <!-- pool allocation -->
          <div class="sim-panel">
            <div class="panel-head">
              <div><h3 data-t="te_pools_t"></h3></div>
            </div>
            <div class="pool-section" id="poolDonut">
              <div style="display:flex;align-items:center;justify-content:center;padding:20px"><span class="spinner"></span></div>
            </div>
          </div>

          <!-- risk panel -->
          <div class="sim-panel" id="riskPanel">
            <div style="display:flex;align-items:center;justify-content:center;padding:20px"><span class="spinner"></span></div>
          </div>

        </div>

        <!-- RIGHT: simulator -->
        <div class="te-right">
          <div class="sim-panel">
            <div class="panel-head">
              <div><h3 data-t="te_simulate"></h3><div class="sub" data-t="sim_banner"></div></div>
              <span class="pill gold" data-t="te_sim"></span>
            </div>

            <!-- mode -->
            <div style="margin-bottom:18px">
              <div class="label" style="margin-bottom:10px" data-t="te_mode_t"></div>
              <div class="mode-chips">
                <div class="mc on" data-mode="offchain" data-t="te_mode_offchain"></div>
                <div class="mc" data-mode="onchain_simulated" data-t="te_mode_simulated"></div>
              </div>
            </div>

            <!-- supply + ratio -->
            <div class="field-grid">
              <div class="field">
                <div class="label" data-t="te_supply_t"></div>
                <div class="num-input"><span>SUPPLY</span><input type="number" id="supplyInput" value="1000000" min="10000"></div>
              </div>
              <div class="field">
                <div class="label" data-t="te_ratio_t"></div>
                <div class="num-input"><span>1 PTS =</span><input type="number" id="ratioInput" value="1" min="1"></div>
              </div>
            </div>

            <!-- airdrop params -->
            <div class="eyebrow no-rule" style="margin-bottom:12px;margin-top:4px"><span data-t="te_airdrop_t"></span></div>
            <div class="field-grid">
              <div class="field">
                <div class="label" data-t="te_airdrop_fans"></div>
                <div class="num-input"><span>FANS</span><input type="number" id="topFansInput" value="50" min="1"></div>
              </div>
              <div class="field">
                <div class="label" data-t="te_airdrop_avg"></div>
                <div class="num-input"><span>AVG</span><input type="number" id="avgAirdropInput" value="1000" min="1"></div>
              </div>
            </div>

            <!-- rewards params -->
            <div class="eyebrow no-rule" style="margin-bottom:12px;margin-top:4px"><span data-t="te_rewards_t"></span></div>
            <div class="field" style="margin-bottom:20px">
              <div class="label" data-t="te_monthly"></div>
              <div class="num-input"><span>€</span><input type="number" id="monthlyBudgetInput" value="5000" min="100"></div>
            </div>

            <button class="btn btn-primary btn-block btn-lg" id="simBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/></svg>
              <span data-t="te_simulate"></span>
            </button>

            <!-- sim results inject here -->
            <div id="simResults"></div>
          </div>

          <!-- why panel -->
          <div class="sim-panel">
            <div class="panel-head">
              <div><h3 data-t="te_readiness_why"></h3></div>
            </div>
            <p class="muted" style="font-size:14px;line-height:1.65" data-t="te_why_desc"></p>
            <div style="margin-top:18px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
              <div class="kpi"><div class="kpi-label">Active fans</div><div class="kpi-value tnum hl">≥100</div><div class="kpi-foot">+25 pts</div></div>
              <div class="kpi"><div class="kpi-label">Superfans</div><div class="kpi-value tnum hl">×2 pts</div><div class="kpi-foot">up to 25</div></div>
              <div class="kpi"><div class="kpi-label">Inner Circle</div><div class="kpi-value tnum hl">×5 pts</div><div class="kpi-foot">up to 20</div></div>
              <div class="kpi"><div class="kpi-label">Points issued</div><div class="kpi-value tnum hl">≥20K</div><div class="kpi-foot">+20 pts</div></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>
<script src="../js/aura-api.js"></script><script src="../js/i18n.js"></script>
<script src="../js/product-shell.js"></script>
<script src="../js/token-economy-copy.js"></script>
<script src="../js/token-economy.js"></script>
</body>
</html>
