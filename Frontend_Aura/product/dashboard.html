<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AURA · Dashboard</title>
<link rel="icon" href="../assets/aura-logo.png">
<link rel="stylesheet" href="../css/aura.css">
<style>
.main{padding:0;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 30px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(8,11,10,.78);backdrop-filter:blur(14px);z-index:20}
.sim-banner{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--gold-soft)} .sim-banner svg{width:15px;height:15px}
.content{padding:clamp(20px,2.4vw,34px);max-width:1280px}

/* header */
.dash-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:24px}
.dash-head h2{font-size:30px;display:flex;align-items:center;gap:10px}
.wave{display:inline-block;animation:wave 2.4s var(--ease) infinite;transform-origin:70% 70%}
@keyframes wave{0%,60%,100%{transform:rotate(0)}10%{transform:rotate(14deg)}20%{transform:rotate(-8deg)}30%{transform:rotate(14deg)}40%{transform:rotate(-4deg)}50%{transform:rotate(10deg)}}
.head-actions{display:flex;gap:10px;align-items:center}
.daterange{display:flex;align-items:center;gap:10px;height:42px;padding:0 16px;border-radius:var(--r-md);background:var(--ink-700);border:1px solid var(--line-strong);font-size:13.5px;color:var(--t-mid);font-weight:500}
.daterange svg{width:15px;height:15px;color:var(--t-lo)}

/* KPI row — union of both sets */
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:14px}
.kcard{background:linear-gradient(180deg,var(--glass-2),rgba(255,247,232,.012));border:1px solid var(--line);border-radius:var(--r-lg);padding:18px;transition:border-color .25s,transform .25s var(--ease);position:relative;overflow:hidden}
.kcard:hover{border-color:var(--line-strong);transform:translateY(-2px)}
.kcard .kl{font-size:12.5px;color:var(--t-lo);font-weight:600;margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kcard .kv{font-family:var(--display);font-weight:600;font-size:30px;letter-spacing:-.03em;color:var(--cream);line-height:1}
.kcard .kv.lime{color:var(--lime)}
.kcard .kv small{font-size:.46em;color:var(--t-lo);font-weight:500}
.kcard .kfoot{margin-top:10px;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--t-lo)}
.kcard .kfoot .excellent{color:var(--lime);font-weight:600}
.kcard .kspark{position:absolute;right:14px;bottom:14px;width:78px;height:30px;overflow:visible;opacity:.95}

/* grids */
.grid3{display:grid;gap:14px;margin-bottom:14px}
.grid-r2{grid-template-columns:1.45fr 1fr 1fr}
.grid-r3{grid-template-columns:1.3fr 1fr 1fr}
.panel{background:linear-gradient(180deg,var(--glass-2),rgba(255,247,232,.01));border:1px solid var(--line);border-radius:var(--r-lg);padding:22px}
.panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px}
.panel-head h3{font-size:16px;font-family:var(--display);font-weight:600;color:var(--cream)}
.panel-head .sub{font-size:12.5px;color:var(--t-lo);margin-top:3px}
.linklike{font-size:13px;color:var(--lime);font-weight:600;cursor:pointer}

/* revenue area chart */
.rev-big{font-family:var(--display);font-size:34px;font-weight:600;letter-spacing:-.03em;color:var(--cream);margin-bottom:4px}
.rev-big small{font-size:.42em;color:var(--t-lo)}
.chart-wrap{position:relative;margin-top:14px}
.chart-svg{width:100%;height:170px;overflow:visible;display:block}
.chart-x{display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--t-lo);font-family:var(--mono)}
.chart-tip{position:absolute;background:var(--lime);color:#0A1206;font-family:var(--display);font-weight:600;font-size:13px;padding:4px 9px;border-radius:8px;transform:translate(-50%,-130%);white-space:nowrap;box-shadow:var(--glow-lime-soft)}

/* funnel */
.funnel{display:flex;flex-direction:column;align-items:flex-start;gap:4px;padding:10px 0 10px 8px}
.fseg{position:relative;display:flex;align-items:center;justify-content:center;color:#0A1206;font-family:var(--display);font-weight:700;font-size:14px;transition:transform .25s var(--ease)}
.fseg:hover{transform:scale(1.03)}
.fseg .fmeta{position:absolute;left:calc(100% + 16px);white-space:nowrap;text-align:left;color:var(--t-mid)}
.fseg .fmeta b{display:block;font-family:var(--display);color:var(--cream);font-size:15px}
.fseg .fmeta span{font-size:11.5px;color:var(--t-lo)}

/* top post */
.post-thumb{position:relative;border-radius:var(--r-md);overflow:hidden;aspect-ratio:16/10;background:
  radial-gradient(60% 80% at 30% 20%, rgba(184,255,77,.25), transparent 60%),
  radial-gradient(50% 70% at 80% 90%, rgba(124,92,255,.4), transparent 60%),
  linear-gradient(135deg,#2a1840,#0e1a2e 70%);border:1px solid var(--line)}
.post-thumb::after{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.18) 1px,transparent 1px);background-size:7px 7px;opacity:.5;mix-blend-mode:overlay}
.post-thumb .play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:50%;background:rgba(8,11,10,.5);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.3);display:grid;place-items:center}
.post-thumb .play svg{width:18px;height:18px;color:#fff;margin-left:2px}
.post-stats{display:flex;gap:18px;margin:16px 0;font-size:14px;color:var(--t-mid)}
.post-stats span{display:flex;align-items:center;gap:7px}
.post-stats svg{width:16px;height:16px;color:var(--lime)}

/* checklist */
.cl-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cl-prog{font-family:var(--mono);font-size:12px;color:var(--t-lo)}
.cl-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px 18px}
.cl-item{display:flex;align-items:center;gap:11px;font-size:13.5px;color:var(--t-mid);cursor:pointer;transition:color .2s}
.cl-item:hover{color:var(--cream)}
.cl-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--line-strong);display:grid;place-items:center;flex:none;transition:all .2s}
.cl-check svg{width:12px;height:12px;color:#0A1206;opacity:0;transition:opacity .2s}
.cl-item.done .cl-check{background:var(--lime);border-color:var(--lime)}
.cl-item.done .cl-check svg{opacity:1}
.cl-item.done{color:var(--t-lo)}
.cl-item.done .cl-label{text-decoration:line-through;text-decoration-color:var(--t-faint)}

/* rewards */
.rw-item{margin-bottom:16px}
.rw-item:last-child{margin-bottom:0}
.rw-top{display:flex;align-items:center;justify-content:space-between;font-size:13.5px;margin-bottom:7px}
.rw-top .rw-name{display:flex;align-items:center;gap:9px;color:var(--cream);font-weight:500}
.rw-dot{width:8px;height:8px;border-radius:50%;background:var(--lime);flex:none}
.rw-top .rw-claims{color:var(--t-lo);font-size:12px}
.rw-top .rw-pct{color:var(--lime);font-weight:700;font-family:var(--mono);font-size:12.5px}
.rw-bar{height:7px;border-radius:var(--r-pill);background:var(--ink-500);overflow:hidden}
.rw-bar span{display:block;height:100%;border-radius:var(--r-pill);background:linear-gradient(90deg,var(--lime-dim),var(--lime));width:0;transition:width 1s var(--ease)}

/* airdrop donut */
.ad-pool{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
.ad-pool .v{font-family:var(--display);font-size:22px;font-weight:600;color:var(--lime)}
.ad-pool .l{font-size:12px;color:var(--t-lo)}
.ad-body{display:flex;align-items:center;gap:18px}
.donut{position:relative;flex:none}
.donut .center{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.donut .center b{font-family:var(--display);font-size:18px;color:var(--cream);display:block;line-height:1}
.donut .center span{font-size:10px;color:var(--t-lo);font-family:var(--mono)}
.ad-legend{display:flex;flex-direction:column;gap:9px;flex:1}
.ad-leg{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--t-mid)}
.ad-leg i{width:10px;height:10px;border-radius:3px;flex:none}
.ad-leg .pct{margin-left:auto;font-family:var(--mono);color:var(--cream);font-size:12px}

@media (max-width:1100px){.kpi-row{grid-template-columns:repeat(3,1fr)}.grid-r2,.grid-r3{grid-template-columns:1fr 1fr}}
@media (max-width:900px){.app-shell{grid-template-columns:1fr}.sidebar{display:none}.grid-r2,.grid-r3{grid-template-columns:1fr}}
@media (max-width:560px){.kpi-row{grid-template-columns:1fr 1fr}.cl-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="aura-bg"></div>
<div class="app-shell" id="shell">
  <main class="main">
    <div class="topbar">
      <h1 style="font-size:19px" data-t="d_title"></h1>
      <div style="display:flex;align-items:center;gap:14px">
        <!-- Instagram connect widget mounts here -->
        <div id="aura-ig-widget"></div>
        <div class="sim-banner">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
          <span data-t="sim_banner"></span>
        </div>
      </div>
    </div>
    <div class="content">

      <!-- header -->
      <div class="dash-head">
        <div>
          <h2 class="display-md"><span data-t="d_hello"></span> <span class="wave">👋</span></h2>
          <p class="muted mt-8" data-t="d_sub"></p>
        </div>
        <div class="head-actions">
          <div class="daterange">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
            <span data-t="d_range"></span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
          </div>
          <button class="btn btn-ghost btn-sm">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>
            <span data-t="d_export"></span>
          </button>
        </div>
      </div>

      <!-- KPI row -->
      <div class="kpi-row" id="kpiRow"></div>

      <!-- row 2 -->
      <div class="grid3 grid-r2">
        <!-- revenue -->
        <div class="panel">
          <div class="panel-head">
            <div><h3 data-t="rev_t"></h3><div class="sub" data-t="rev_sub"></div></div>
            <span class="pill gold" data-t="rev_sim"></span>
          </div>
          <div class="rev-big tnum"><span data-t="rev_v"></span><small data-t="rev_per"></small></div>
          <div class="chart-wrap">
            <svg class="chart-svg" id="revChart" viewBox="0 0 460 170" preserveAspectRatio="none"></svg>
            <div class="chart-tip" id="revTip"></div>
            <div class="chart-x" id="revX"></div>
          </div>
        </div>
        <!-- funnel -->
        <div class="panel">
          <div class="panel-head"><h3 data-t="fn_t"></h3></div>
          <div class="funnel" id="funnel"></div>
        </div>
        <!-- top post -->
        <div class="panel">
          <div class="panel-head"><h3 data-t="tp_t"></h3></div>
          <div class="post-thumb" id="postThumb">
            <div class="play" id="postPlay"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>
          </div>
          <div class="post-stats">
            <span><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-8-4.5-8-10a4 4 0 018-1 4 4 0 018 1c0 5.5-8 10-8 10z"/></svg><span id="tpLikes">—</span></span>
            <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a8 8 0 01-11 7L4 21l2-6a8 8 0 1115-3z"/></svg><span id="tpComments">—</span></span>
            <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l5-5 4 4 8-9"/><path d="M16 7h5v5"/></svg><span id="tpReach">—</span></span>
          </div>
          <button class="btn btn-ghost btn-sm btn-block" data-t="tp_all"></button>
        </div>
      </div>

      <!-- row 3 -->
      <div class="grid3 grid-r3">
        <!-- checklist -->
        <div class="panel">
          <div class="cl-head">
            <h3 style="font-family:var(--display);font-size:16px;color:var(--cream)" data-t="cl_t"></h3>
            <span class="cl-prog" id="clProg"></span>
          </div>
          <div class="cl-grid" id="checklist"></div>
        </div>
        <!-- rewards -->
        <div class="panel">
          <div class="panel-head">
            <div><h3 data-t="rw_t"></h3><div class="sub" data-t="rw_sub"></div></div>
          </div>
          <div id="rewards"></div>
          <div class="linklike mt-16" data-t="rw_all"></div>
        </div>
        <!-- airdrop -->
        <div class="panel">
          <div class="panel-head"><h3 data-t="ad_t"></h3></div>
          <div class="ad-pool">
            <span class="l" data-t="ad_pool"></span>
            <span class="v" id="adPool">—</span>
          </div>
          <div class="ad-body">
            <div class="donut" id="donut"></div>
            <div class="ad-legend" id="adLegend"></div>
          </div>
          <button class="btn btn-primary btn-sm btn-block mt-20" id="airdropBtn" data-t="ad_btn"></button>
        </div>
      </div>

    </div>
  </main>
</div>
<script src="../js/aura-api.js"></script><script src="../js/i18n.js"></script>
<script src="../js/product-shell.js"></script>
<script src="../js/dashboard-copy.js"></script>
<script src="../js/dashboard.js"></script>
</body>
</html>
