<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AURA · Analyzer</title>
<link rel="icon" href="../assets/aura-logo.png">
<link rel="stylesheet" href="../css/aura.css">
<style>
.main { padding: 0; min-height:100vh; display:flex; flex-direction:column; }
.topbar { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:18px 30px; border-bottom:1px solid var(--line); position:sticky; top:0; background:rgba(8,11,10,.75); backdrop-filter:blur(14px); z-index:20; }
.topbar h1 { font-size:19px; }
.content { flex:1; padding: clamp(24px,3vw,44px); }
.sim-banner { display:flex; align-items:center; gap:10px; font-size:12.5px; color:var(--gold-soft); }
.sim-banner svg{width:15px;height:15px;flex:none}

/* ---- input stage ---- */
.stage-input { max-width:620px; margin: clamp(30px,6vh,80px) auto; text-align:center; }
.stage-input .orb { width:96px;height:96px;margin:0 auto 28px; border-radius:50%; display:grid;place-items:center; background:radial-gradient(circle at 50% 35%, rgba(184,255,77,.18), transparent 70%); border:1px solid rgba(184,255,77,.25); box-shadow:var(--glow-lime-soft); }
.suggest { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:20px; }
.suggest button { padding:7px 14px; border-radius:var(--r-pill); background:var(--glass-2); border:1px solid var(--line); font-size:13px; color:var(--t-mid); font-family:var(--mono); transition:all .2s; }
.suggest button:hover { border-color:rgba(184,255,77,.4); color:var(--lime); }

/* ---- loading stage ---- */
.stage-load { max-width:560px; margin: clamp(30px,8vh,100px) auto; text-align:center; }
.load-ring { width:130px;height:130px;margin:0 auto 34px; position:relative; display:grid;place-items:center; }
.load-ring svg { position:absolute; inset:0; transform:rotate(-90deg); }
.load-pct { font-family:var(--display); font-size:34px; font-weight:600; color:var(--cream); }
.load-steps { display:flex; flex-direction:column; gap:12px; max-width:380px; margin:30px auto 0; text-align:left; }
.load-step { display:flex; align-items:center; gap:13px; font-size:14.5px; color:var(--t-lo); transition:color .3s; }
.load-step .tick { width:24px;height:24px;border-radius:50%; border:1.5px solid var(--line-strong); display:grid;place-items:center;flex:none; transition:all .3s; }
.load-step .tick svg{width:13px;height:13px;opacity:0;transition:opacity .3s}
.load-step.done { color:var(--cream); }
.load-step.done .tick { background:var(--lime); border-color:var(--lime); }
.load-step.done .tick svg{opacity:1;color:#0A1206}
.load-step.active { color:var(--cream); }
.load-step.active .tick { border-color:var(--lime); }

/* ---- results ---- */
.res { max-width:1180px; margin:0 auto; }
.res-head { display:flex; align-items:flex-start; gap:20px; flex-wrap:wrap; margin-bottom:26px; }
.res-pfp { width:74px;height:74px;border-radius:50%; background:linear-gradient(135deg,#2a3530,#12382b); border:2px solid var(--line-strong); display:grid;place-items:center; font-family:var(--display); color:var(--lime); font-size:30px; flex:none; }
.res-grid { display:grid; grid-template-columns: 1.15fr 1fr; gap:18px; align-items:start; }
.score-panel { padding:30px; text-align:center; }
.big-ring { position:relative; width:200px;height:200px;margin:0 auto 18px; display:grid;place-items:center; }
.big-ring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.big-ring .v { font-family:var(--display); font-size:62px; font-weight:600; color:var(--cream); letter-spacing:-.03em; line-height:1; }
.big-ring .v small { font-size:.32em; color:var(--t-lo); }
.metric-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.bd-row { display:flex; align-items:center; justify-content:space-between; gap:14px; padding:13px 0; border-bottom:1px solid var(--line); }
.bd-row:last-child{border-bottom:none}
.bd-row .bar { flex:1; max-width:160px; height:7px; border-radius:var(--r-pill); background:var(--ink-500); overflow:hidden; }
.bd-row .bar span { display:block; height:100%; background:linear-gradient(90deg,var(--lime-dim),var(--lime)); border-radius:var(--r-pill); }
.rec-card { background:linear-gradient(135deg, rgba(18,56,43,.4), var(--ink-700)); border:1px solid rgba(184,255,77,.2); }
.rec-step { display:flex; gap:14px; padding:14px 0; border-bottom:1px solid var(--line); }
.rec-step:last-child{border-bottom:none}
.rec-step .n { width:30px;height:30px;border-radius:50%;background:var(--glass-2);border:1px solid var(--line-strong);display:grid;place-items:center;font-family:var(--mono);font-size:13px;color:var(--lime);flex:none }
.post-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.post-th { aspect-ratio:1; border-radius:var(--r-md); background:linear-gradient(135deg,var(--ink-500),var(--forest-700)); border:1px solid var(--line); position:relative; overflow:hidden; display:flex;align-items:flex-end; padding:8px; }
.post-th .e { font-size:11px;font-family:var(--mono);color:var(--lime);background:rgba(8,11,10,.7);padding:3px 7px;border-radius:6px; }
.post-th.top { border-color:rgba(184,255,77,.4); box-shadow:var(--glow-lime-soft); }

@media (max-width:900px){ .res-grid{grid-template-columns:1fr} .metric-grid,.post-grid{grid-template-columns:1fr 1fr} .app-shell{grid-template-columns:1fr} .sidebar{display:none} }
.fade-in { animation: fadein .5s var(--ease) both; }
@keyframes fadein { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }
</style>
</head>
<body>
<div class="aura-bg"></div>
<div class="app-shell" id="shell">
  <main class="main">
    <div class="topbar">
      <div>
        <h1 data-t="nav_analyzer">Analyzer</h1>
      </div>
      <div class="sim-banner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        <span data-t="sim_banner"></span>
      </div>
    </div>
    <div class="content">

      <!-- INPUT -->
      <section id="stageInput" class="stage-input">
        <div class="orb float"><img src="../assets/aura-logo.png" width="52" height="52" alt=""></div>
        <div class="eyebrow" style="justify-content:center;margin-bottom:16px"><span data-t="a_eyebrow"></span></div>
        <h2 class="display-md txt-grad" data-t="a_title"></h2>
        <p class="lede" style="margin:16px auto 30px;max-width:30em" data-t="a_sub"></p>
        <div class="input-ig" style="max-width:460px;margin:0 auto;padding-right:6px">
          <span class="at">@</span>
          <input type="text" id="igInput" data-t-attr="placeholder:a_ph" autocomplete="off">
          <button class="btn btn-primary" id="analyzeBtn" data-t="a_btn"></button>
        </div>
        <div class="suggest">
          <button data-u="maya.studio">@maya.studio</button>
          <button data-u="leo.trains">@leo.trains</button>
          <button data-u="thekitchenella">@thekitchenella</button>
        </div>
        <p class="faint" style="font-size:12.5px;margin-top:22px" data-t="a_note"></p>
      </section>

      <!-- LOADING -->
      <section id="stageLoad" class="stage-load hide">
        <div class="load-ring">
          <svg width="130" height="130" viewBox="0 0 130 130">
            <circle cx="65" cy="65" r="58" fill="none" stroke="rgba(232,220,200,.1)" stroke-width="6"/>
            <circle id="loadArc" cx="65" cy="65" r="58" fill="none" stroke="var(--lime)" stroke-width="6" stroke-linecap="round" stroke-dasharray="364" stroke-dashoffset="364" style="filter:drop-shadow(0 0 6px rgba(184,255,77,.6));transition:stroke-dashoffset .3s linear"/>
          </svg>
          <div class="load-pct" id="loadPct">0%</div>
        </div>
        <h3 class="h-lg" id="loadTitle" data-t="a_load_title"></h3>
        <p class="muted mt-8" id="loadHandle"></p>
        <div class="load-steps" id="loadSteps"></div>
      </section>

      <!-- RESULTS -->
      <section id="stageResults" class="res hide"></section>

    </div>
  </main>
</div>

<script src="../js/aura-api.js"></script><script src="../js/i18n.js"></script>
<script src="../js/product-shell.js"></script>
<script src="../js/analyzer-copy.js"></script>
<script src="../js/analyzer.js"></script>
</body>
</html>
